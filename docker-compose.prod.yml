services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eventrelay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventrelay"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  proxy:
    build:
      context: .
      dockerfile: proxy/Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/eventrelay}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      PUBLIC_API_URL: ${PUBLIC_BASE_URL:-http://backend:8000}
      USE_NETWORK_PROXY: ${USE_NETWORK_PROXY:-true}
      NETWORK_PROXY_URL: ${NETWORK_PROXY_URL:-http://proxy:8080/proxy}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["/app/backend/scripts/start-worker.sh"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/eventrelay}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      USE_NETWORK_PROXY: ${USE_NETWORK_PROXY:-true}
      NETWORK_PROXY_URL: ${NETWORK_PROXY_URL:-http://proxy:8080/proxy}
      NETWORK_PROXY_LATENCY_MS: ${NETWORK_PROXY_LATENCY_MS:-300}
      NETWORK_PROXY_TIMEOUT_RATE: ${NETWORK_PROXY_TIMEOUT_RATE:-0}
      NETWORK_PROXY_FAILURE_RATE: ${NETWORK_PROXY_FAILURE_RATE:-0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      proxy:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      backend:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
