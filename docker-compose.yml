services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hookhub
      POSTGRES_USER: hookhub
      POSTGRES_PASSWORD: hookhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hookhub -d hookhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  proxy:
    build:
      context: .
      dockerfile: proxy/Dockerfile
    ports:
      - "8080:8080"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://hookhub:hookhub@postgres:5432/hookhub
      REDIS_URL: redis://redis:6379/0
      USE_NETWORK_PROXY: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["/app/backend/scripts/start-worker.sh"]
    environment:
      DATABASE_URL: postgresql+psycopg://hookhub:hookhub@postgres:5432/hookhub
      REDIS_URL: redis://redis:6379/0
      USE_NETWORK_PROXY: "true"
      NETWORK_PROXY_URL: http://proxy:8080/proxy
      NETWORK_PROXY_LATENCY_MS: "300"
      NETWORK_PROXY_TIMEOUT_RATE: "0"
      NETWORK_PROXY_FAILURE_RATE: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      proxy:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      INTERNAL_API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
